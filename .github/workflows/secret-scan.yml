name: Secret scan (gitleaks)

# Defense-in-depth secret scan. GitHub's built-in push protection is on for
# public repos by default; this adds a gitleaks pass over the full history
# on PRs and on every push to main, so the mistake of committing a real
# .env / API key can't slip through.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # Required for gitleaks to annotate PRs (only used on pull_request events).
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan everything, not just the latest commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Free public Gitleaks rules; the action's defaults already include
          # a curated set. Override GITLEAKS_CONFIG here if a custom rules
          # file is added later.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
